    <!-- Decorative lines -->
    <path d="M 100 10 L 100 30" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    <path d="M 100 170 L 100 190" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    <path d="M 10 100 L 30 100" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    <path d="M 170 100 L 190 100" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
</svg>
